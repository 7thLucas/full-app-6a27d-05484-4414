<style>
  .mode-landscape .sl-layout { flex-direction: row; }
  .mode-portrait  .sl-layout { flex-direction: column; }
  .mode-landscape .sl-left  { width: 52%; }
  .mode-portrait  .sl-left  { width: 100%; flex: 1; }
  .mode-landscape .sl-right { width: 48%; }
  .mode-portrait  .sl-right { width: 100%; min-height: 220px; }
</style>
<section class="w-full h-full overflow-auto bg-white">
  <div class="sl-layout flex h-full">

    <!-- Left content column -->
    <div class="sl-left bg-white flex flex-col justify-between p-12">
      <div>
        <!-- Brand mark -->
        <div class="flex items-center gap-2.5 mb-10">
          <div class="w-9 h-9 rounded-xl bg-indigo-600 flex items-center justify-center flex-shrink-0">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 18V5l12-2v13"/>
              <circle cx="6" cy="18" r="3"/>
              <circle cx="18" cy="16" r="3"/>
            </svg>
          </div>
          <span class="text-slate-400 text-xs font-bold tracking-widest uppercase">Music Insight Analyzer</span>
        </div>

        <!-- Hero headline -->
        <h1 class="text-6xl font-black text-slate-900 leading-none mb-5">
          Your Music,<br/>
          <span class="text-indigo-600">Decoded.</span>
        </h1>

        <!-- Tagline -->
        <p class="text-slate-500 text-base leading-relaxed max-w-sm mb-8">
          AI-powered analysis that reads like feedback from a music producer, critic, and marketing expert — all in one report.
        </p>

        <!-- Feature chips -->
        <div class="flex flex-wrap gap-2">
          <span class="px-3 py-1.5 bg-indigo-50 text-indigo-700 text-xs font-semibold rounded-full">Mood &amp; Emotion</span>
          <span class="px-3 py-1.5 bg-purple-50 text-purple-700 text-xs font-semibold rounded-full">Genre Analysis</span>
          <span class="px-3 py-1.5 bg-pink-50 text-pink-700 text-xs font-semibold rounded-full">Commercial Appeal</span>
          <span class="px-3 py-1.5 bg-slate-100 text-slate-600 text-xs font-semibold rounded-full">16 Dimensions</span>
        </div>
      </div>

      <!-- Attribution placeholder -->
      <data-attribution />
    </div>

    <!-- Right image column -->
    <div class="sl-right relative overflow-hidden bg-slate-900 flex-shrink-0">
      <img
        src="https://api-stag.qb-deck.quantumbyte.ai/common/image-generation?prompt=vibrant%20music%20audio%20waveform%20visualization%20headphones%20dark%20background%20neon%20purple%20pink%20glow%20premium%20abstract%20music%20art%20cinematic%20mood"
        alt="Music visualization"
        class="w-full h-full object-cover"
      />
      <!-- Soft blend into white left edge -->
      <div class="absolute inset-0" style="background: linear-gradient(to right, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0) 28%);"></div>
    </div>

  </div>
